site_name: トリッカルデータ
site_description: トリッカルの攻略アセット
site_url: https://roflsunriz.github.io/trickcal-data/

theme:
  name: material
  language: ja
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - ホーム: index.md
  - 緊急！バイオデンジャー1号 攻略:
      - 憂鬱: yuuutsu.md
      - 活発: kappatsu.md
      - 狂気: kyouki.md
      - 冷静: reisei.md
      - 純粋: junsui.md
      - その他: other.md

extra_css:
  - stylesheets/extra.css
