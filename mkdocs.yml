site_name: トリッカルデータ
site_description: |-
  このサイトが含む情報:
  - トリッカルの緊急！バイオデンジャー1号の攻略情報
  - トリッカルの文字起こし（遺物カードとスペルカード）
  - トリッカルのおすすめ使徒編成表
  - トリッカルの研究室の生産ラボの情報（必要素材数と、第10段階以降の予想）
site_url: https://roflsunriz.github.io/trickcal-data/

theme:
  name: material
  custom_dir: overrides
  language: ja
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - ホーム: index.md
  - 緊急！バイオデンジャー1号 攻略:
      - 憂鬱: yuuutsu.md
      - 活発: kappatsu.md
      - 狂気: kyouki.md
      - 冷静: reisei.md
      - 純粋: junsui.md
      - その他: other.md
  - 文字起こし:
      - 遺物カード: artifact-cards.md
      - スペルカード: spell-cards.md
  - 使徒編成表: apostle-formation-table.md
  - 研究室:
      - 生産ラボ 第10段階: research-stage-10.md
      - 生産ラボ 第11段階（予想）: research-stage-11.md
      - 生産ラボ 第12段階（予想）: research-stage-12.md
      - 生産ラボ 第13段階（予想）: research-stage-13.md
      - 生産ラボ 第14段階（予想）: research-stage-14.md
      - 生産ラボ 第15段階（予想）: research-stage-15.md

plugins:
  - search
  - git-revision-date-localized:
      type: date
      locale: ja
      timezone: Asia/Tokyo
      fallback_to_build_date: true
      enable_parallel_processing: false

extra_css:
  - stylesheets/extra.css
